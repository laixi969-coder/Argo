name: Argo 每日机会流水线

# 每天 07:00 / 13:00 / 19:00（北京时间）跑，结果累计进当日榜单。
# 也支持在 GitHub Actions 页面手动点 "Run workflow" 立即跑一次。
on:
  schedule:
    - cron: "0 23 * * *"   # 23:00 UTC = 次日 07:00 Asia/Shanghai
    - cron: "0 5 * * *"    # 05:00 UTC = 当日 13:00 Asia/Shanghai
    - cron: "0 11 * * *"   # 11:00 UTC = 当日 19:00 Asia/Shanghai
  workflow_dispatch: {}

# 手动触发与定时撞车时排队，避免两个进程同时覆盖当天快照。
concurrency:
  group: argo-daily-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # Python 的 date.today() 必须按业务时区落盘，不能跟随 runner 的 UTC。
      TZ: Asia/Shanghai
      KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
      KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 安装依赖
        run: pip install -r requirements.txt
      - name: 跑流水线（数据源 key、LLM 配置都从 KV 读取）
        run: python -m src.main
      - name: 校验今日历史已发布且未被演示数据污染
        run: python -m src.verify_daily

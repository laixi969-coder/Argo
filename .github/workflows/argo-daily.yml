name: Argo 每日选品扫描（旧版·仅手动）

# 旧版定时已停用：避免与 daily.yml 重复运行、互相覆盖同一天的榜单。
# 保留 workflow_dispatch 仅供历史排障；正式定时统一由 daily.yml 管理。
on:
  workflow_dispatch: {}

concurrency:
  group: argo-daily-pipeline
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: 跑扫描流水线
        run: python -m src.main
        env:
          TIKHUB_API_KEY: ${{ secrets.TIKHUB_API_KEY }}
          TIKHUB_BASE_URL: ${{ secrets.TIKHUB_BASE_URL }}
          PRODUCTHUNT_TOKEN: ${{ secrets.PRODUCTHUNT_TOKEN }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          REPORT_TO: ${{ secrets.REPORT_TO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}

name: Argo 每日选品扫描

# 北京时间 7:00 / 13:00 / 19:00（GitHub 用 UTC，对应 23:00 / 05:00 / 11:00）
on:
  schedule:
    - cron: "0 23 * * *"
    - cron: "0 5 * * *"
    - cron: "0 11 * * *"
  workflow_dispatch: {}   # 允许在 GitHub 网页上手动点一下立即跑

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: 跑扫描流水线
        run: python -m src.main
        env:
          TIKHUB_API_KEY: ${{ secrets.TIKHUB_API_KEY }}
          TIKHUB_BASE_URL: ${{ secrets.TIKHUB_BASE_URL }}
          PRODUCTHUNT_TOKEN: ${{ secrets.PRODUCTHUNT_TOKEN }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          REPORT_TO: ${{ secrets.REPORT_TO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
